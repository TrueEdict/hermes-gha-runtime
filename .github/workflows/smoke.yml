name: Hermes Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Check provider secret
        shell: bash
        run: |
          test -n "$OPENROUTER_API_KEY" || {
            echo "OPENROUTER_API_KEY is missing"
            exit 2
          }

      - name: Run Hermes
        uses: ./
        with:
          prompt: 'Read README.md and summarize this repository in three sentences. Do not modify files.'
          toolsets: 'safe,file'
          provider: 'openrouter'
          model: 'deepseek/deepseek-chat'
          output-file: 'hermes-response.md'
          timeout-seconds: '300'
